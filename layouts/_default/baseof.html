<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      <p class="tagline">{{ .Site.Params.description }}</p>
      <nav class="nav">
        <a href="{{ "/" | relURL }}">Home</a>
        <a href="{{ "/posts/" | relURL }}">Posts</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="wrap">(c) {{ now.Format "2006" }} {{ .Site.Params.author }}</div>
  </footer>
</body>
</html>
