{{ define "main" }}
  <article class="post">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <p class="meta">{{ .Date.Format "2006-01-02" }}</p>
    </header>

    <div class="post-content">
      {{ .Content }}
    </div>

    <p class="back-link">
      <a href="{{ "/posts/" | relURL }}">返回文章列表</a>
    </p>
  </article>
{{ end }}
